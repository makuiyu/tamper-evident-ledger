services:
  db:
    image: postgres:16-alpine
    container_name: tamper-evident-ledger-db
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit
      POSTGRES_DB: audit
    ports:
      # Host port 55432 to avoid clashing with any local Postgres on 5432.
      - "55432:5432"
    volumes:
      - audit_chain_demo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit -d audit"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  audit_chain_demo_pg:
